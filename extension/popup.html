<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google 联想抓取</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="wrap">
      <p class="hint">
        在 <strong>https://www.google.com/</strong> 展开联想后，点「从当前页抓取」或使用快捷键
        <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>G</kbd>。「复制文本」会把当前整棵联想树按 Tab 缩进导出到剪贴板。
      </p>

      <div class="row">
        <button id="capture" type="button" class="btn primary">从当前页抓取</button>
        <button id="copy" type="button" class="btn">复制文本</button>
        <button id="clear" type="button" class="btn danger">清空展示</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>

      <div id="tree-wrap" class="tree-wrap" hidden>
        <div class="tree-label">
          联想树：左侧 <strong>▶/▼</strong> 折叠或展开已有子项；点击词条从 Google 加载下一层联想。
        </div>
        <div class="tree" role="tree" aria-label="抓取到的联想">
          <div class="tree-root-row">
            <button
              type="button"
              id="root-branch-toggle"
              class="tree-caret"
              hidden
              aria-label="展开或折叠第一层联想"
              aria-expanded="true"
            >
              ▼
            </button>
            <div class="tree-root" id="tree-root" role="treeitem" aria-level="1" aria-expanded="true"></div>
          </div>
          <ul class="tree-children" id="tree-children" role="group"></ul>
        </div>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
